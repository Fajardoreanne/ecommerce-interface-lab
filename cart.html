<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>Your Cart</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="products.html">Products</a>
            <a href="checkout.html">Checkout</a>
        </nav>
    </header>

    <main class="container">

        <ul class="cart-items">

            <li class="cart-item">
                <h3>Pink Summer Dress</h3>
                <p class="price">799</p>
                <label for="quantity2">Quantity:</label>
                <input type="number" id="quantity2" name="quantity2" value="1" min="1" required>
            </li>

        </ul>

        <section class="checkout-summary">
            <h3>Subtotal: <span class="price">799</span></h3>
            <button onclick="location.href='checkout.html'">Proceed to Checkout</button>
        </section>

    </main>

</body>
</html>
