<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - PrettyGirl Boutique</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>Products</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="products.html">Products</a>
            <a href="cart.html">Cart</a>
            <a href="checkout.html">Checkout</a>
        </nav>
    </header>

    <main class="container">

        <aside>
            <h3>Filter</h3>
            <form>
                <label>Size</label><br>
                <input type="checkbox"> Small<br>
                <input type="checkbox"> Medium<br>
                <input type="checkbox"> Large<br><br>

                <label>Price</label><br>
                <input type="radio" name="price"> Low<br>
                <input type="radio" name="price"> High<br>
            </form>
        </aside>

        <section class="products">

            <article class="product-card">
                <img src="photo1.png" alt="Pink Summer Dress">
                <h3>Pink Summer Dress</h3>
                <p class="price">799</p>
                <a href="detaildress.html">View Details</a>
            </article>

            <article class="product-card">
                <img src="photo2.jpg" alt="Floral Skirt">
                <h3>Floral Skirt</h3>
                <p class="price">599</p>
                <a href="detail2.html">View Details</a>
            </article>

        </section>

    </main>

</body>
</html>
